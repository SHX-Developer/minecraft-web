<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SHX CRAFT</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="underwater-overlay" aria-hidden="true"></div>
      <div id="crosshair" aria-hidden="true"></div>
      <div id="hotbar" aria-label="Hotbar"></div>
      <canvas id="held-item-canvas" aria-hidden="true"></canvas>
      <div id="inventory-overlay" aria-hidden="true">
        <div id="inventory-panel">
          <div id="inventory-header">
            <span>Creative Inventory</span>
            <span class="inventory-hint">E to close</span>
          </div>
          <div id="inventory-main">
            <div id="inventory-left-decor">
              <div id="inventory-armor-column">
                <div class="armor-slot"></div>
                <div class="armor-slot"></div>
                <div class="armor-slot"></div>
                <div class="armor-slot"></div>
              </div>
              <div id="inventory-player-preview"></div>
            </div>
            <div id="inventory-crafting-wrap">
              <div class="inventory-section-title">Crafting</div>
              <div id="inventory-crafting-placeholder">
                <div id="craft-grid-2x2">
                  <div class="craft-slot"></div>
                  <div class="craft-slot"></div>
                  <div class="craft-slot"></div>
                  <div class="craft-slot"></div>
                </div>
                <div class="craft-arrow">→</div>
                <div class="craft-result-slot"></div>
              </div>
            </div>
            <div id="inventory-creative">
              <div class="inventory-section-title">Creative Blocks</div>
              <div id="inventory-creative-grid"></div>
            </div>
          </div>
          <div class="inventory-section-title">Storage</div>
          <div id="inventory-storage-grid"></div>
          <div id="inventory-bottom-row">
            <div id="inventory-hotbar-wrap">
              <div class="inventory-section-title">Hotbar</div>
              <div id="inventory-hotbar-grid"></div>
            </div>
            <button id="inventory-trash-slot" type="button" title="Drop item here to delete">
              🗑
            </button>
          </div>
        </div>
      </div>
      <div id="inventory-cursor-item" aria-hidden="true"></div>
      <div id="hint">
        Click to lock pointer. E inventory, double Space flight, Shift crouch, double W sprint, wheel or
        1-9 select block.
      </div>
      <div id="debug" aria-live="polite"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
